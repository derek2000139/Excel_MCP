profiles:
  basic_edit:
    description: "基础编辑 - 只加载 workbook / sheet / range / names / server"
    bundles:
      - foundation
      - edit
    # 2026-03-29: tool_budget 从 30 调整为 35
    # 原因: foundation(12) + edit(19) = 31 个工具，原预算 30 已超限
    # 详见设计文档V2.2 §11.5.1
    tool_budget: 35
    risk_level: low

  calc_format:
    description: "公式与格式 - 在基础编辑上增加 formula / format"
    bundles:
      - foundation
      - edit
      - calc_format
    tool_budget: 40
    risk_level: low

  automation:
    description: "自动化 - VBA 与恢复工具"
    bundles:
      - foundation
      - automation
      - recovery
    tool_budget: 20
    risk_level: medium

  data_workflow:
    description: "数据工作流 - PQ / Table / 审计分析"
    bundles:
      - foundation
      - data
      - analysis
    tool_budget: 15
    risk_level: medium

  reporting:
    description: "报表与可视化 - report / analysis"
    bundles:
      - foundation
      - report
      - analysis
    tool_budget: 15
    risk_level: medium

  all:
    description: "全部工具 - 开发 / 调试用途"
    bundles:
      - foundation
      - edit
      - calc_format
      - analysis
      - automation
      - recovery
      - data
      - report
    tool_budget: null
    risk_level: high
    is_development: true
