# ExcelForge 配置文件
# 复制此文件为 config.yaml 并修改其中的路径配置

server:
  version: "1.0.1"
  actor_id: "local-mcp-client"

excel:
  visible: true
  disable_events: true
  disable_alerts: true
  force_disable_macros: false
  health_ping_enabled: true
  max_rebuild_attempts: 3

paths:
  # 允许访问的目录列表
  # 使用 "*" 表示允许访问所有路径（安全风险高）
  # 或指定具体路径，如 "C:/Users/derek/Documents"
  allowed_roots:
    - "*"
  snapshots_dir: "./.runtime_data/snapshots"
  backups_dir: "./.runtime_data/backups"
  sqlite_path: "./.runtime_data/excelforge.db"

tools:
  profile: "default"
  groups:
    core: true
    vba: true
    recovery: false
    names: false

limits:
  max_open_workbooks: 8
  max_read_cells: 10000
  max_write_cells: 10000
  operation_timeout_seconds: 30
  max_vba_code_size_bytes: 1048576

snapshot:
  max_per_workbook: 50
  max_total_size_mb: 200
  max_age_hours: 24

backup:
  max_per_workbook: 10
  max_total_size_mb: 500
  max_age_hours: 48

security:
  vba_policy:
    enabled: true
    block_levels:
      - "critical"
      - "high"
    warn_levels:
      - "medium"
