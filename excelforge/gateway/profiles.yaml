profiles:
  basic_edit:
    description: "基础编辑 - 只加载 workbook / sheet / range / names / server"
    bundles:
      - foundation
      - edit
    tool_budget: 30
    risk_level: low

  calc_format:
    description: "公式与格式 - 在基础编辑上增加 formula / format"
    bundles:
      - foundation
      - edit
      - calc_format
    tool_budget: 40
    risk_level: low

  automation:
    description: "自动化 - VBA 与恢复工具"
    bundles:
      - foundation
      - automation
      - recovery
    tool_budget: 20
    risk_level: medium

  data_workflow:
    description: "数据工作流 - PQ / Table / 审计分析"
    bundles:
      - foundation
      - data
      - analysis
    tool_budget: 15
    risk_level: medium

  reporting:
    description: "报表与可视化 - report / analysis"
    bundles:
      - foundation
      - report
      - analysis
    tool_budget: 15
    risk_level: medium

  all:
    description: "全部工具 - 开发 / 调试用途"
    bundles:
      - foundation
      - edit
      - calc_format
      - analysis
      - automation
      - recovery
      - data
      - report
    tool_budget: null
    risk_level: high
    is_development: true
